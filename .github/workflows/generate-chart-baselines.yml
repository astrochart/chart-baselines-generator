name: Generate CHART Baselines

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install matplotlib numpy

      - name: Run builds_uv.py
        working-directory: assets/scripts
        run: python builds_uv.py

      - name: Commit generated output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/scripts/chart_baselines.png assets/scripts/builds.kml
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "Auto-generate CHART build baselines image"
            git push
          fi
